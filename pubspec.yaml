name: fit_eat
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: ^2.5.4
  firebase_core: ^4.3.0
  firebase_storage: ^13.0.6
  cloud_firestore: ^6.1.1
  supabase_flutter: ^2.12.0
  uuid: ^4.5.2
  get_it: ^9.2.1
  google_sign_in: ^7.2.0
  firebase_auth: ^6.3.0
  go_router: ^17.0.1
  # network manager
  provider: ^6.1.5+1
  dio: ^5.9.0
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8

  phosphor_flutter: ^2.1.0
  video_player: ^2.11.1
  flutter_svg: ^2.2.3
  cupertino_icons: ^1.0.8
  pinput: ^6.0.1
  dotted_border: ^3.1.0
  image_picker: ^1.2.1
  shimmer: ^3.0.0
  flutter_image_compress: ^2.4.0
  lottie: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/rozets/
    - assets/json/

  fonts:
    - family: Open Sans

      fonts:
        - asset: assets/fonts/OpenSans-Regular.ttf
        - asset: assets/fonts/OpenSans-Bold.ttf
        - asset: assets/fonts/OpenSans-Light.ttf
        - asset: assets/fonts/OpenSans-SemiBold.ttf
        - asset: assets/fonts/OpenSans-Italic.ttf
